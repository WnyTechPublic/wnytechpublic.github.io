<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WnyTech Demos</title>
  <link rel="stylesheet" href="style.css" />
<style>
</style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>WnyTech</h1>
      <p class="tagline">데모 페이지 모음</p>
    </div>
  </header>

  <main class="container">
    <section class="demo-grid">
      <a class="demo-card" href="/test/">
        <h2>Test Demo</h2>
        <p>샘플 데모 페이지입니다.</p>
        <span class="demo-path">/test/</span>
      </a>

      <!-- 새 데모를 추가하려면 위 <a class="demo-card"> 블록을 복사해서 href만 바꾸면 됩니다. -->
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> WnyTech</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
