<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WnyTech Demos</title>
  <link rel="stylesheet" href="style.css" />
<style>
    .site-list { margin-top: 28px; padding-top: 20px; border-top: 1px solid #d0d7de; }
    .site-list h2 { margin: 0 0 12px; font-size: 20px; letter-spacing: 0; }
    .site-list ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .site-list li { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
    .site-list a { color: #0969da; font-weight: 700; text-decoration: none; }
    .site-list a:hover { text-decoration: underline; }
    .site-list span { color: #57606a; }
</style>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1>WnyTech</h1>
      <p class="tagline">데모 페이지 모음</p>
    </div>
  </header>

  <main class="container">
    <section class="demo-grid">
      <a class="demo-card" href="/test/">
        <h2>Test Demo</h2>
        <p>샘플 데모 페이지입니다.</p>
        <span class="demo-path">/test/</span>
      </a>

      <!-- 새 데모를 추가하려면 위 <a class="demo-card"> 블록을 복사해서 href만 바꾸면 됩니다. -->
    </section>
  
    <section class="site-list" aria-label="Published pages">
      <h2>Published Pages</h2>
      <ul>
        <li><a href="/test1/">test1</a> <span>GitHub Pages 연결 테스트</span></li>
      </ul>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <span id="year"></span> WnyTech</p>
    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
