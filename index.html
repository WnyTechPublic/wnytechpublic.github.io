<!DOCTYPE html>

<head>

  <link rel="stylesheet" href="style.css" />
<style>

    .site-list { margin-top: 28px; padding-top: 20px; border-top: 1px solid #d0d7de; }
    .site-list h2 { margin: 0 0 12px; font-size: 20px; letter-spacing: 0; }
    .site-list ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 10px; }
    .site-list li { display: flex; gap: 10px; align-items: baseline; flex-wrap: wrap; }
    .site-list a { color: #0969da; font-weight: 700; text-decoration: none; }
    .site-list a:hover { text-decoration: underline; }
    .site-list span { color: #57606a; }

<body>
  <header class="site-header">
    <div class="container">

      <p class="tagline">데모 페이지 모음</p>
    </div>
  </header>

  <main class="container">
    <section class="site-list" aria-label="Published pages">
      <h2>Published Pages</h2>
      <ul>
        <li><a href="/uberagent-es-sizing/">uberagent-es-sizing</a> <span>uberAgent Elasticsearch sizing demo</span></li>
        <li><a href="/elasticml/">elasticml</a> <span>Elastic ML demo</span></li>
        <li><a href="/es-primary-size/">es-primary-size</a> <span>Elasticsearch primary size demo</span></li>
</ul>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">

    </div>
  </footer>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
